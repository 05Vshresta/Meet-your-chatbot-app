<!DOCTYPE html>
<html>
   <head>
       <link rel="stylesheet" href="style.css"/>
       <title>Chatbot-container</title>
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous">
        <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
        <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js" integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV" crossorigin="anonymous"></script>
      
        <script src="https://kit.fontawesome.com/5f59ca6ad3.js" crossorigin="anonymous"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
   </head>
   <body>

      <div class="container">
         <div class="chatbot-container d-flex flex-column justify-content-center">
            <div class="main-container">
              <h1>Meet Your Chatbot</h1>
               <p>Your personal assistant is here to help</p>
            </div>
         </div>

            <header>
              <h5 class="sub-heading">Hello! I'm your friendly Chatbot assistant. How can I help you today?</h5>
            </header>  
            
            <div class="d-flex flex-row justify-content-center mb-3 mt-3">
               <button class="btn btn-outline-primary button ">Say Hi</button>
               <button class="btn btn-outline-primary button">What can you do?</button>
               <button class="btn btn-outline-primary button">Tell me a joke</button>
               <button class="btn btn-outline-primary button">Help</button>
            </div>
  
              
            <div class="chatbot-icon">
               <a href="#" class="btn btn-light icon">
               <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.-->

               </svg>
               </a>
            </div>

            <div id="chatContainer" class="chat-container">
            </div>


            <div class="user-icon d-flex flex-row justify-content-end ">
                 <a href="#" class="btn btn-light icon">
                     <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
                        <path d="M320 312C386.3 312 440 258.3 440 192C440 125.7 386.3 72 320 72C253.7 72 200 125.7 200 192C200 258.3 253.7 312 320 312zM290.3 368C191.8 368 112 447.8 112 546.3C112 562.7 125.3 576 141.7 576L498.3 576C514.7 576 528 562.7 528 546.3C528 447.8 448.2 368 349.7 368L290.3 368z"/>
                     </svg>
                 </a>
            </div>      
            
            <div class="d-flex flex-row justify-content-center m-3">
                
               <input id="userInput" class="user-input"  type="text" placeholder="Type your message here"/>
                  <button href="#"
                     id="sendMsgBtn"
                     class="btn btn-primary send-btn"
                     onclick="sendMsgToChatbot()">
                  <i class="fa-solid fa-paper-plane"></i>
                    
                  </button>

            </div>    
         </div>       
      </div>
 
      <script src="app.js"></script>
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
      <script src="https://kit.fontawesome.com/5f59ca6ad3.js" crossorigin="anonymous"></script>

 
   </body>
</html>
